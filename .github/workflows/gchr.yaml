name: CI Pipeline (Test + Docker Build + Push)

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write   #  required for GHCR

env:
  DOCKER_IMAGE: myapp
  REGISTRY: docker.io
  IMAGE_TAG: latest

jobs:
  test:
    name: Run Tests in Docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Test Image
        run: docker build -t test-image .

      - name: Run Container for Testing
        run: docker run -d -p 3000:3000 --name test-container test-image

      - name: Test Application Endpoint (with retry)
        run: |
          for i in {1..10}; do
            if curl -f http://localhost:3000; then
              echo " Application is reachable"
              exit 0
            fi
            echo "⏳ Waiting for application... attempt $i"
            sleep 5
          done

          echo " Application failed to start"
          docker logs test-container
          exit 1

      - name: Stop Container
        run: docker rm -f test-container || true

  build_and_push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Image Tag (Dynamic)
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      # 🔧 Setup Buildx (required for build-push-action)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      #  Login Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      #  Login GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      #  Build & Push using build-push-action
      - name: Build and Push Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            docker.io/${{ vars.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }}
            ghcr.io/${{ github.repository_owner }}/${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print Image Info
        run: |
          echo "Docker Hub: docker.io/${{ vars.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }}"
          echo "GHCR: ghcr.io/${{ github.repository_owner }}/${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }}"
