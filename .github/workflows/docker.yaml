name: Build and Push Docker Image

on:
  push:
    branches: ["main"]

# 🌍 Global ENV (available to all jobs)
env:
  DOCKER_IMAGE: myapp
  REGISTRY: docker.io
  IMAGE_TAG: latest

jobs:
  build_and_push:
    runs-on: ubuntu-latest

    #  Job-level ENV (overrides global if needed)
    env:
      APP_ENV: production

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Image Tag (Dynamic)
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t $REGISTRY/${{ vars.DOCKER_USERNAME }}/$DOCKER_IMAGE:$IMAGE_TAG .

      - name: Push Docker Image
        run: |
          docker push $REGISTRY/${{ vars.DOCKER_USERNAME }}/$DOCKER_IMAGE:$IMAGE_TAG

      - name: Print Image Info
        run: |
          echo "Image pushed: $REGISTRY/${{ vars.DOCKER_USERNAME }}/$DOCKER_IMAGE:$IMAGE_TAG"
