name: CI Pipeline (Test + Docker Build + Push)


on:
  push:
    branches: ["main"]

env:
  DOCKER_IMAGE: myapp
  REGISTRY: docker.io
  IMAGE_TAG: latest

jobs:
  test:
    name: Run Tests in Docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Test Image
        run: |
          docker build -t test-image .

      - name: Run Container for Testing
        run: |
          docker run -d -p 3000:3000 --name test-container test-image

      - name: Wait for App to Start
        run: sleep 10

      - name: Get Container IP
        run: |
          CONTAINER_IP=$(docker inspect -f '{{range.NetworkSettings.Networks}}{{.IPAddress}}{{end}}' test-container)
          echo "Container IP: $CONTAINER_IP"
          echo "CONTAINER_IP=$CONTAINER_IP" >> $GITHUB_ENV

      - name: Test Application Endpoint
        run: |
          curl http://localhost:3000 || exit 1

      - name: Stop Container
        run: docker stop test-container

  build_and_push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test   # ✅ ensures test stage runs first

    env:
      APP_ENV: production

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Image Tag (Dynamic)
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t $REGISTRY/${{ vars.DOCKER_USERNAME }}/$DOCKER_IMAGE:$IMAGE_TAG .

      - name: Push Docker Image
        run: |
          docker push $REGISTRY/${{ vars.DOCKER_USERNAME }}/$DOCKER_IMAGE:$IMAGE_TAG

      - name: Print Image Info
        run: |
          echo "Image pushed: $REGISTRY/${{ vars.DOCKER_USERNAME }}/$DOCKER_IMAGE:$IMAGE_TAG"
